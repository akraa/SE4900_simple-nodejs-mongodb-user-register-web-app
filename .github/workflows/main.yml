# The name of the workflow as it will appear in the "Actions" tab on GitHub
name: RegisterApp CI Pipeline

# The "on" keyword defines the events that trigger the workflow
on:
  # Trigger on pull requests so the AI review runs before merge
  pull_request:
    types: [ opened, synchronize, reopened, ready_for_review ]

# The "jobs" section groups all the tasks to be executed
jobs:
  ai-code-review-google:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: AI Code Review
        uses: AleksandrFurmenkovOfficial/ai-code-review@v1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          owner: ${{ github.repository_owner }}
          repo: ${{ github.event.repository.name }}
          pr_number: ${{ github.event.number }}
          ai_provider: google
          google_api_key: ${{ secrets.GOOGLE_API_KEY }}
